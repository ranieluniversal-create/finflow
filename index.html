<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FinFlow</title>
<link rel="manifest" href="manifest.json"/>
<script>
// Inline manifest para garantir PWA instalável
const manifestData = {
  name: "FinFlow — Controle Financeiro",
  short_name: "FinFlow",
  description: "Controle suas finanças de forma simples",
  start_url: "./",
  display: "standalone",
  background_color: "#0f1117",
  theme_color: "#0f1117",
  orientation: "portrait-primary",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%2300d084'/%3E%3Ctext x='256' y='360' font-size='300' text-anchor='middle' fill='%230f1117' font-family='serif' font-weight='bold'%3E%24%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const url = URL.createObjectURL(blob);
document.querySelector('link[rel="manifest"]').href = url;
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --bg3: #1e2436;
  --border: rgba(255,255,255,0.07);
  --text: #f0f2f8;
  --muted: #6b7280;
  --green: #00d084;
  --green-dim: rgba(0,208,132,0.12);
  --red: #ff5b6b;
  --red-dim: rgba(255,91,107,0.12);
  --yellow: #f5c542;
  --blue: #4f8ef7;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100svh; max-width: 430px; margin: 0 auto; position: relative; }

/* HEADER */
.header { padding: 52px 20px 0; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header-top h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.header-top h1 span { color: var(--green); }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--green-dim); border: 1.5px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }

/* SALDO CARD */
.saldo-card { background: var(--green); border-radius: var(--radius); padding: 22px 22px 20px; margin: 0 0 6px; position: relative; overflow: hidden; }
.saldo-card::before { content: ''; position: absolute; right: -20px; top: -20px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.08); }
.saldo-card::after { content: ''; position: absolute; right: 30px; top: 30px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); }
.saldo-label { font-size: 11px; font-weight: 500; color: rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.saldo-value { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: #0f1117; letter-spacing: -1px; line-height: 1; }
.saldo-row { display: flex; gap: 16px; margin-top: 18px; }
.mini-stat { flex: 1; background: rgba(0,0,0,0.12); border-radius: 10px; padding: 10px 12px; }
.mini-stat .lbl { font-size: 10px; color: rgba(0,0,0,0.55); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; gap: 4px; }
.mini-stat .val { font-family: 'DM Mono', monospace; font-size: 16px; color: #0f1117; font-weight: 500; margin-top: 2px; }
.arr-up { color: #0f1117; font-size: 12px; }
.arr-dn { color: #c0392b; font-size: 12px; }

/* MONTH NAV */
.month-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 8px; flex-shrink: 0; }
.month-nav button { background: var(--bg3); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 8px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.month-nav button:active { opacity: .7; }
.month-title { font-size: 14px; font-weight: 500; color: var(--text); }

/* SCROLL AREA */
.scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { display: none; }

/* BAR CHART */
.chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.chart-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 500; margin-bottom: 14px; }
.bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-track { width: 100%; flex: 1; display: flex; align-items: flex-end; }
.bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height .4s ease; }
.bar-income { background: var(--green); }
.bar-expense { background: var(--red); opacity: .85; }
.bar-lbl { font-size: 9px; color: var(--muted); }

/* TRANSAÇÕES */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-header h3 { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
.section-header span { font-size: 12px; color: var(--green); cursor: pointer; }

.tx-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; transition: background .15s; animation: fadeIn .25s ease; }
.tx-item:active { background: var(--bg3); }
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
.tx-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.tx-icon.inc { background: var(--green-dim); }
.tx-icon.exp { background: var(--red-dim); }
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-cat { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tx-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; flex-shrink: 0; }
.tx-amount.inc { color: var(--green); }
.tx-amount.exp { color: var(--red); }

.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.empty div { font-size: 36px; margin-bottom: 8px; }

/* BOTTOM NAV */
.bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 10px 20px 24px; max-width: 430px; margin: 0 auto; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px; border-radius: 10px; transition: background .15s; }
.nav-btn:active { background: var(--bg3); }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.nav-btn .lbl { font-size: 10px; font-weight: 500; }
.nav-btn.active svg, .nav-btn.active .lbl { color: var(--green); stroke: var(--green); }
.nav-btn:not(.active) svg, .nav-btn:not(.active) .lbl { color: var(--muted); stroke: var(--muted); }

.fab { width: 52px; height: 52px; border-radius: 50%; background: var(--green); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(0,208,132,0.35); flex-shrink: 0; transition: transform .15s; }
.fab:active { transform: scale(0.93); }
.fab svg { width: 26px; height: 26px; stroke: #0f1117; stroke-width: 2.5; }

/* MODAL */
.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; z-index: 100; backdrop-filter: blur(4px); }
.overlay.open { display: flex; animation: fadeOverlay .2s ease; }
@keyframes fadeOverlay { from { opacity:0; } to { opacity:1; } }
.sheet { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: none; opacity:1; } }
.sheet-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
.sheet-title button { background: var(--bg3); border: none; color: var(--muted); width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* TYPE TOGGLE */
.type-toggle { display: flex; background: var(--bg3); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
.type-btn { flex: 1; padding: 9px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .2s, color .2s; background: transparent; }
.type-btn.active-inc { background: var(--green); color: #0f1117; }
.type-btn.active-exp { background: var(--red); color: #fff; }
.type-btn:not(.active-inc):not(.active-exp) { color: var(--muted); }

/* FORM */
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; font-weight: 500; display: block; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .2s; -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--green); }
.form-group select option { background: var(--bg3); }
.form-group input[type=number] { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; text-align: center; }
.btn-submit { width: 100%; padding: 15px; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: opacity .15s; }
.btn-submit.inc { background: var(--green); color: #0f1117; }
.btn-submit.exp { background: var(--red); color: #fff; }
.btn-submit:active { opacity: .85; }

/* DELETE */
.tx-item.swipe { background: var(--red-dim); }
.del-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* STATS PAGE */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-card .sc-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 4px; }
.stat-card .sc-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
.stat-card.green .sc-val { color: var(--green); }
.stat-card.red .sc-val { color: var(--red); }

.cat-list { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.cat-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.cat-row:last-child { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-name { flex: 1; font-size: 13px; }
.cat-bar-wrap { width: 80px; height: 4px; background: var(--bg3); border-radius: 2px; }
.cat-bar-fill { height: 100%; border-radius: 2px; background: var(--green); }
.cat-amt { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); min-width: 70px; text-align: right; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h1>Fin<span>Flow</span></h1>
      <div class="avatar">💰</div>
    </div>
    <div class="saldo-card">
      <div class="saldo-label">Saldo atual</div>
      <div class="saldo-value" id="saldoTotal">R$ 0,00</div>
      <div class="saldo-row">
        <div class="mini-stat">
          <div class="lbl"><span class="arr-up">▲</span> Receitas</div>
          <div class="val" id="totalInc">R$ 0</div>
        </div>
        <div class="mini-stat">
          <div class="lbl"><span class="arr-dn">▼</span> Despesas</div>
          <div class="val" id="totalExp">R$ 0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MÊS NAV -->
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="month-title" id="monthTitle">—</span>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <!-- PAGES -->
  <div class="scroll">

    <!-- HOME PAGE -->
    <div class="page active" id="pageHome">
      <div class="chart-wrap">
        <div class="chart-title">Últimos 6 meses</div>
        <div class="bars" id="barsChart"></div>
        <div style="display:flex;gap:12px;margin-top:10px;">
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);">
            <div style="width:8px;height:8px;border-radius:2px;background:var(--green);"></div> Receita
          </div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);">
            <div style="width:8px;height:8px;border-radius:2px;background:var(--red);"></div> Despesa
          </div>
        </div>
      </div>

      <div class="section-header">
        <h3>Transações</h3>
      </div>
      <div id="txList"></div>
    </div>

    <!-- STATS PAGE -->
    <div class="page" id="pageStats">
      <div class="stats-grid">
        <div class="stat-card green">
          <div class="sc-label">Maior receita</div>
          <div class="sc-val" id="statMaxInc">—</div>
        </div>
        <div class="stat-card red">
          <div class="sc-label">Maior despesa</div>
          <div class="sc-val" id="statMaxExp">—</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Transações</div>
          <div class="sc-val" id="statCount">0</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">Média diária</div>
          <div class="sc-val" id="statAvg">—</div>
        </div>
      </div>
      <div class="section-header" style="margin-bottom:10px;">
        <h3>Gastos por categoria</h3>
      </div>
      <div class="cat-list" id="catBreakdown"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-btn active" id="navHome" onclick="setPage('home')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/></svg>
      <span class="lbl">Início</span>
    </div>
    <div style="flex:1;display:flex;justify-content:center;">
      <button class="fab" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="nav-btn" id="navStats" onclick="setPage('stats')">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="lbl">Análise</span>
    </div>
  </div>

  <!-- MODAL ADICIONAR -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="sheet" onclick="e=>e.stopPropagation()">
      <div class="sheet-title">
        Nova transação
        <button onclick="closeModal()">×</button>
      </div>

      <div class="type-toggle">
        <button class="type-btn active-inc" id="btnInc" onclick="setType('inc')">▲ Receita</button>
        <button class="type-btn" id="btnExp" onclick="setType('exp')">▼ Despesa</button>
      </div>

      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="inpVal" placeholder="0,00" step="0.01" min="0" inputmode="decimal"/>
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="inpDesc" placeholder="Ex: Supermercado"/>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="inpCat"></select>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="inpDate"/>
      </div>

      <button class="btn-submit inc" id="btnSubmit" onclick="addTx()">Adicionar receita</button>
    </div>
  </div>

</div>

<script>
const CATS_INC = ['Salário','Freelance','Investimentos','Presente','Outro'];
const CATS_EXP = ['Alimentação','Moradia','Transporte','Saúde','Lazer','Educação','Roupas','Contas','Outro'];
const ICONS = {
  'Salário':'💼','Freelance':'💻','Investimentos':'📈','Presente':'🎁',
  'Alimentação':'🛒','Moradia':'🏠','Transporte':'🚗','Saúde':'💊',
  'Lazer':'🎮','Educação':'📚','Roupas':'👕','Contas':'⚡','Outro':'📌'
};
const COLORS = ['#00d084','#4f8ef7','#f5c542','#ff5b6b','#a78bfa','#fb923c','#34d399','#f472b6','#60a5fa'];

let currentType = 'inc';
let currentMonth, currentYear;
let txs = JSON.parse(localStorage.getItem('finflow_txs') || '[]');

function fmt(v) {
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function init() {
  const now = new Date();
  currentMonth = now.getMonth();
  currentYear = now.getFullYear();
  document.getElementById('inpDate').value = now.toISOString().split('T')[0];
  setCats();
  render();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
}

function monthLabel(m, y) {
  return new Date(y, m, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
}

function changeMonth(dir) {
  currentMonth += dir;
  if(currentMonth < 0) { currentMonth = 11; currentYear--; }
  if(currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
}

function filtered() {
  return txs.filter(t => {
    const d = new Date(t.date + 'T12:00:00');
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  });
}

function render() {
  document.getElementById('monthTitle').textContent = monthLabel(currentMonth, currentYear);
  const list = filtered();
  const inc = list.filter(t=>t.type==='inc').reduce((s,t)=>s+t.val,0);
  const exp = list.filter(t=>t.type==='exp').reduce((s,t)=>s+t.val,0);
  const saldo = inc - exp;
  document.getElementById('saldoTotal').textContent = fmt(saldo);
  document.getElementById('totalInc').textContent = fmt(inc);
  document.getElementById('totalExp').textContent = fmt(exp);
  renderTxList(list);
  renderChart();
  renderStats(list);
}

function renderTxList(list) {
  const el = document.getElementById('txList');
  if(!list.length) {
    el.innerHTML = '<div class="empty"><div>💸</div>Nenhuma transação neste mês<br><small>Toque no + para adicionar</small></div>';
    return;
  }
  const sorted = [...list].sort((a,b) => new Date(b.date) - new Date(a.date));
  el.innerHTML = sorted.map((t,i) => `
    <div class="tx-item" onclick="deleteTx('${t.id}')">
      <div class="tx-icon ${t.type}">${ICONS[t.cat]||'📌'}</div>
      <div class="tx-info">
        <div class="tx-desc">${t.desc}</div>
        <div class="tx-cat">${t.cat} · ${new Date(t.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type==='inc'?'+':'-'}${fmt(t.val)}</div>
    </div>
  `).join('') + '<div class="del-hint">Toque para excluir</div>';
}

function renderChart() {
  const el = document.getElementById('barsChart');
  const months = [];
  for(let i=5;i>=0;i--) {
    let m = currentMonth - i, y = currentYear;
    if(m<0){m+=12;y--;}
    const label = new Date(y,m,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
    const mt = txs.filter(t=>{const d=new Date(t.date+'T12:00:00');return d.getMonth()===m&&d.getFullYear()===y;});
    months.push({
      label,
      inc: mt.filter(t=>t.type==='inc').reduce((s,t)=>s+t.val,0),
      exp: mt.filter(t=>t.type==='exp').reduce((s,t)=>s+t.val,0)
    });
  }
  const max = Math.max(...months.map(m=>Math.max(m.inc,m.exp)), 1);
  el.innerHTML = months.map(m => `
    <div class="bar-col">
      <div class="bar-track" style="display:flex;align-items:flex-end;gap:2px;flex:1;width:100%;">
        <div class="bar bar-income" style="flex:1;height:${Math.round((m.inc/max)*100)}%;"></div>
        <div class="bar bar-expense" style="flex:1;height:${Math.round((m.exp/max)*100)}%;"></div>
      </div>
      <div class="bar-lbl">${m.label}</div>
    </div>
  `).join('');
}

function renderStats(list) {
  const incList = list.filter(t=>t.type==='inc');
  const expList = list.filter(t=>t.type==='exp');
  const maxInc = incList.length ? Math.max(...incList.map(t=>t.val)) : 0;
  const maxExp = expList.length ? Math.max(...expList.map(t=>t.val)) : 0;
  const avgDaily = list.length ? (expList.reduce((s,t)=>s+t.val,0)/30) : 0;
  document.getElementById('statMaxInc').textContent = maxInc ? fmt(maxInc) : '—';
  document.getElementById('statMaxExp').textContent = maxExp ? fmt(maxExp) : '—';
  document.getElementById('statCount').textContent = list.length;
  document.getElementById('statAvg').textContent = avgDaily ? fmt(avgDaily) : '—';

  const cats = {};
  expList.forEach(t => { cats[t.cat] = (cats[t.cat]||0) + t.val; });
  const total = expList.reduce((s,t)=>s+t.val,0)||1;
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const el = document.getElementById('catBreakdown');
  if(!sorted.length) { el.innerHTML = '<div class="empty" style="padding:20px;"><div>📊</div>Sem despesas neste mês</div>'; return; }
  el.innerHTML = sorted.map(([name,val],i) => `
    <div class="cat-row">
      <div class="cat-dot" style="background:${COLORS[i%COLORS.length]};"></div>
      <div class="cat-name">${name}</div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${Math.round((val/total)*100)}%;background:${COLORS[i%COLORS.length]};"></div></div>
      <div class="cat-amt">${fmt(val)}</div>
    </div>
  `).join('');
}

function setPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
  document.getElementById('nav'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
}

function setType(t) {
  currentType = t;
  document.getElementById('btnInc').className = 'type-btn' + (t==='inc'?' active-inc':'');
  document.getElementById('btnExp').className = 'type-btn' + (t==='exp'?' active-exp':'');
  document.getElementById('btnSubmit').className = 'btn-submit ' + t;
  document.getElementById('btnSubmit').textContent = t==='inc' ? 'Adicionar receita' : 'Adicionar despesa';
  setCats();
}

function setCats() {
  const sel = document.getElementById('inpCat');
  const cats = currentType==='inc' ? CATS_INC : CATS_EXP;
  sel.innerHTML = cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function openModal() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('inpVal').focus();
}

function closeModal(e) {
  if(!e || e.target===document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('inpVal').value='';
    document.getElementById('inpDesc').value='';
  }
}

function addTx() {
  const val = parseFloat(document.getElementById('inpVal').value);
  const desc = document.getElementById('inpDesc').value.trim();
  const cat = document.getElementById('inpCat').value;
  const date = document.getElementById('inpDate').value;
  if(!val||val<=0||!desc||!date) { document.getElementById('inpVal').focus(); return; }
  txs.push({ id: Date.now().toString(), type: currentType, val, desc, cat, date });
  localStorage.setItem('finflow_txs', JSON.stringify(txs));
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('inpVal').value='';
  document.getElementById('inpDesc').value='';
  render();
}

function deleteTx(id) {
  if(!confirm('Excluir esta transação?')) return;
  txs = txs.filter(t=>t.id!==id);
  localStorage.setItem('finflow_txs', JSON.stringify(txs));
  render();
}

init();
</script>
</body>
</html>
